type: service
name: general-image

# Stable OpenAI Images API endpoint. Select the checkpoint at apply time with
# `-e MODEL=...`; changing it replaces the backend while preserving this URL.
# This image is built from the pinned upstream vLLM-Omni source commit by the
# `Build vLLM-Omni image` workflow. Make the GHCR package public before launch.
image: ghcr.io/gurdasnijor/vllm-omni@sha256:8f46deb42329a2cf2e280c656d10734e0c5fb8469a99852db6f620f92f6f64ae
shell: bash
env:
  - MODEL
  - HF_TOKEN=${{ secrets.HF_TOKEN }}

commands:
  - |
    set -euo pipefail

    backend_args=()
    case "${PIPELINE_BACKEND:-native}" in
      native)
        ;;
      diffusers)
        backend_args+=(--diffusion-load-format diffusers)
        ;;
      *)
        echo "PIPELINE_BACKEND must be 'native' or 'diffusers'" >&2
        exit 2
        ;;
    esac

    lora_args=()
    if [[ -n "${LORA_REPO:-}" ]]; then
      lora_path=/root/.cache/huggingface/loras/requested
      LORA_PATH="$lora_path" python - <<'PY'
    import os
    from huggingface_hub import snapshot_download

    snapshot_download(
        repo_id=os.environ["LORA_REPO"],
        revision=os.environ.get("LORA_REVISION") or None,
        local_dir=os.environ["LORA_PATH"],
    )
    PY
      lora_args+=(--lora-path "$lora_path")
    fi

    exec vllm serve "$MODEL" \
      --omni \
      --host 0.0.0.0 \
      --port 8000 \
      "${backend_args[@]}" \
      "${lora_args[@]}" ${{ run.args }}

port: 8000
gateway: false
auth: true

# Do not set `model`: dstack's default model probe targets chat completions,
# while diffusion models expose modality-specific APIs.
probes:
  - type: http
    url: /health
    interval: 15s
    timeout: 10s
    ready_after: 2

volumes:
  # Shared RunPod cache persists model weights across two-hour GPU sessions.
  - name: runpod-hf-cache-us-mo-2
    path: /root/.cache/huggingface

backends: [runpod]
regions: [US-MO-2]
spot_policy: auto
max_price: 5.00
max_duration: 2h

retry:
  on_events: [no-capacity, interruption]
  duration: 20m

# A 48GB floor covers SDXL and SD3.5-class native pipelines. Override `--gpu`
# for a model that needs 80GB or multiple GPUs; the $5 ceiling is unchanged.
resources:
  cpu: 8..
  memory: 64GB..
  shm_size: 16GB
  disk: 150GB..
  gpu:
    memory: 48GB..
    count: 1
